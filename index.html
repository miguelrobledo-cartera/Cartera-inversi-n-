<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor de Cartera IA</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.5rem; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; background-color: #e8f0fe; border-left: 5px solid var(--primary); display: none; line-height: 1.6; white-space: pre-wrap; }
        .error { color: #d93025; font-size: 0.85rem; margin-top: 10px; text-align: center; font-weight: bold; }
        .loading { text-align: center; margin-top: 15px; display: none; font-style: italic; color: #5f6368; }
    </style>
</head>
<body>

    <label>API Key de Gemini</label>
    <input type="password" id="apiKey" placeholder="Pega tu clave AIza...">
    
    <label>Capital Inicial (€)</label>
    <input type="number" id="capital" value="41400">
    
    <label>Nivel de Riesgo</label>
    <select id="riesgo">

        <option value="moderado" selected>Moderado (Equilibrado)</option>
        <option value="agresivo">Agresivo (Crecimiento)</option>
    </select>
    
    <button id="btnEjecutar" onclick="analizar()">Generar Plan de Inversión</button>
    
    <div id="loading" class="loading">Consultando con la IA...</div>
    <div id="result"></div>
    <div id="errorLog" class="error"></div>
</div>
